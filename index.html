<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duct Divers — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-shell">

    <nav class="nav">
      <div class="nav-logo">
        <span class="logo-mark">DD</span>
        <span class="logo-text">Duct Divers</span>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link">New Sale</a>
        <a href="hours.html" class="nav-link">Hours</a>
        <a href="leaderboard.html" class="nav-link active">Board</a>
      </div>
    </nav>

    <main class="main">

      <div class="page-header">
        <h1 class="page-title">Leaderboard</h1>
        <p class="page-sub">Today · <span id="todayDate"></span></p>
      </div>

      <!-- Toggle -->
      <div class="board-toggle">
        <button class="toggle-btn active" id="btnToday"   onclick="switchBoard('today')">Today</button>
        <button class="toggle-btn"        id="btnAllTime" onclick="switchBoard('alltime')">All Time</button>
      </div>

      <!-- Subtitle + last updated -->
      <div class="board-meta">
        <span class="board-subtitle" id="boardSubtitle">Today's sales only</span>
        <span class="last-updated"   id="lastUpdated"></span>
      </div>

      <!-- Loading spinner -->
      <div id="boardLoading" class="board-loading">
        <div class="spinner"></div>
        <span>Loading...</span>
      </div>

      <!-- Board content -->
      <div id="boardContent" class="board-content" hidden>
        <div class="podium"     id="podium"></div>
        <div class="board-list" id="boardList"></div>
      </div>

      <!-- Empty state -->
      <div id="boardEmpty" class="board-empty" hidden>
        <span class="empty-icon">📋</span>
        <p>No sales logged yet for this period.</p>
      </div>

      <!-- Motivational quote — below the scoreboard -->
      <div class="quote-bar" id="motivationalQuote"></div>

    </main>
  </div>

  <!-- config and sheets MUST load before leaderboard.js -->
  <script src="js/config.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/leaderboard.js"></script>
</body>
</html>
